<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prism Scouter v4.5 🌙🐉</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --moon-pink: #ff3399;
            --neon-pink: #ff007f;
            --dbz-orange: #ff8c00;
            --ssj-gold: #ffd700;
            --scouter-green: #39ff14;
            --cosmic-dark: #070012;
            --rpg-blue: #000080;
            --glass: rgba(15, 5, 30, 0.75);
            --retro-border: 4px solid #fff;
            --text-glow: 0 0 5px var(--moon-pink), 0 0 10px var(--neon-pink);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--cosmic-dark);
            color: #fff;
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* SAILOR MOON MATRIX CANVAS */
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.5; }

        /* HEADER */
        header {
            background: linear-gradient(90deg, var(--moon-pink), var(--rpg-blue));
            text-align: center; padding: 20px; border-bottom: 3px solid var(--dbz-orange);
            box-shadow: 0 0 20px var(--dbz-orange); position: sticky; top: 0; z-index: 10;
            backdrop-filter: blur(5px);
        }

        header h1 { 
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.6rem; 
            color: #fff; text-shadow: var(--text-glow); letter-spacing: 2px;
        }
        .subtitle { font-size: 0.75rem; color: var(--scouter-green); font-weight: bold; margin-top: 5px; }
        .syncing { animation: pulse 1s infinite; color: var(--ssj-gold); }

        /* FLOATING HUD TIMER */
        #scouter-timer {
            position: fixed; top: 90px; right: 15px; background: rgba(0, 0, 0, 0.95);
            border: 2px solid var(--scouter-green); color: var(--scouter-green);
            padding: 8px 15px; border-radius: 8px; z-index: 1000;
            box-shadow: 0 0 15px var(--scouter-green); display: flex; align-items: center; gap: 15px;
            font-family: 'Orbitron', sans-serif; transition: 0.3s;
        }
        #scouter-timer.hidden { transform: translateX(150%); opacity: 0; }
        #timer-display { font-size: 1.4rem; font-weight: bold; text-shadow: 0 0 8px var(--scouter-green); }
        .timer-close-btn { background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; opacity: 0.6; }
        .timer-alert { animation: alarmFlash 0.5s infinite !important; }
        @keyframes alarmFlash { 0% { background: #000; color: #ff003c; border-color: #ff003c; } 50% { background: #ff003c; color: #fff; border-color: #fff; } 100% { background: #000; color: #ff003c; border-color: #ff003c; } }
        
        .inline-timer-btn {
            background: var(--scouter-green); color: #000; border: none; padding: 2px 8px;
            border-radius: 4px; font-size: 0.75rem; font-family: 'Orbitron', sans-serif; font-weight: bold;
            cursor: pointer; margin-left: 8px; vertical-align: middle; box-shadow: 0 0 5px var(--scouter-green);
        }
        .inline-timer-btn:active { background: #fff; transform: scale(0.95); }

        /* CONTAINERS & CARDS */
        .app-container { padding: 15px; max-width: 600px; margin: 0 auto; position: relative; z-index: 5; }
        
        .card {
            background: var(--glass); border: 2px solid var(--moon-pink); border-radius: 12px;
            padding: 18px; margin-bottom: 25px; box-shadow: 0 0 15px rgba(255, 51, 153, 0.4), inset 0 0 10px rgba(255, 51, 153, 0.2);
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-family: 'Orbitron', sans-serif; color: var(--ssj-gold); font-size: 1.2rem;
            border-bottom: 1px solid var(--moon-pink); padding-bottom: 10px; margin-bottom: 15px;
            text-shadow: 0 0 8px var(--ssj-gold); display: flex; justify-content: space-between; align-items: center;
        }

        /* DROPDOWN MENU (TABLE OF CONTENTS) */
        .recipe-selector {
            width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.8);
            border: 2px solid var(--ssj-gold); color: var(--ssj-gold); font-family: 'Orbitron', sans-serif;
            font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; outline: none;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); text-transform: uppercase;
        }
        .recipe-selector option { background: var(--cosmic-dark); color: #fff; font-family: 'Space Mono', monospace; }

        /* RECIPE SPECIFICS */
        .recipe-stat-bar { display: flex; gap: 10px; margin-bottom: 15px; font-size: 0.8rem; }
        .stat-badge { background: rgba(255, 140, 0, 0.2); border: 1px solid var(--dbz-orange); color: var(--dbz-orange); padding: 4px 8px; border-radius: 4px; }
        .hardware-list { font-size: 0.8rem; color: #ccc; margin-bottom: 15px; border-left: 2px solid var(--dbz-orange); padding-left: 10px; line-height: 1.5; }

        .phase-header { font-family: 'Orbitron', sans-serif; color: var(--scouter-green); font-size: 1rem; border-bottom: 1px solid var(--scouter-green); padding-bottom: 4px; margin: 20px 0 10px 0; text-transform: uppercase; }
        .instruction-step { margin-bottom: 15px; line-height: 1.6; font-size: 0.9rem; border-left: 3px solid var(--rpg-blue); padding-left: 10px; background: rgba(0, 0, 128, 0.1); padding-top: 8px; padding-bottom: 8px; }
        .instruction-step b { color: var(--ssj-gold); text-shadow: 0 0 2px var(--ssj-gold); }
        .kid-alert { background: rgba(255, 51, 153, 0.15); border-left: 3px solid var(--moon-pink); padding: 10px; margin-top: 10px; font-size: 0.85rem; color: #fff; line-height: 1.5; }

        /* LISTS */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px dashed rgba(255,255,255,0.2); font-size: 0.85rem; }
        .power-level { font-family: 'Orbitron', sans-serif; color: var(--scouter-green); text-shadow: 0 0 5px var(--scouter-green); font-weight: bold; }
        .critical-warning { color: #ff003c; text-shadow: 0 0 8px #ff003c; font-size: 0.75rem; animation: pulse 1.5s infinite; display: block; margin-top: 4px; font-weight: bold; }
        .soon-warning { color: var(--dbz-orange); text-shadow: 0 0 8px var(--dbz-orange); font-size: 0.75rem; display: block; margin-top: 4px; }

        /* MARKET CHECKBOXES */
        .shop-item { display: flex; align-items: center; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--moon-pink); border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .shop-item.bought { border-color: var(--scouter-green); background: rgba(57, 255, 20, 0.1); opacity: 0.6; }
        .shop-item.bought .item-name { text-decoration: line-through; color: var(--scouter-green); }
        .checkbox { width: 20px; height: 20px; border: 2px solid var(--moon-pink); border-radius: 4px; margin-right: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 5px var(--moon-pink); }
        .bought .checkbox { background: var(--scouter-green); border-color: var(--scouter-green); box-shadow: 0 0 8px var(--scouter-green); }
        .bought .checkbox::after { content: '✓'; color: #000; font-weight: bold; }

        /* BUTTONS */
        .magic-btn { background: rgba(0,0,0,0.5); border: 2px solid var(--dbz-orange); color: var(--dbz-orange); padding: 12px; width: 100%; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; border-radius: 8px; box-shadow: inset 0 0 10px rgba(255, 140, 0, 0.2), 0 0 10px rgba(255, 140, 0, 0.4); transition: 0.2s; margin-top: 10px; }
        .magic-btn:active { background: var(--dbz-orange); color: #000; box-shadow: 0 0 20px var(--dbz-orange); transform: translateY(2px); }
        .magic-btn.pink { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: inset 0 0 10px rgba(255, 0, 127, 0.2), 0 0 10px rgba(255, 0, 127, 0.4); }
        .magic-btn.pink:active { background: var(--neon-pink); color: #fff; }
        .magic-btn.green { border-color: var(--scouter-green); color: var(--scouter-green); box-shadow: inset 0 0 10px rgba(57, 255, 20, 0.2), 0 0 10px rgba(57, 255, 20, 0.4); }
        .magic-btn.green:active { background: var(--scouter-green); color: #000; }

        /* NAV */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 0, 26, 0.95); border-top: 2px solid var(--moon-pink); display: flex; justify-content: space-around; padding: 12px 0 25px 0; z-index: 100; backdrop-filter: blur(10px); box-shadow: 0 -5px 15px rgba(255, 51, 153, 0.3); }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #666; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--neon-pink); text-shadow: 0 0 5px var(--neon-pink); }
        .nav-icon { font-size: 1.5rem; margin-bottom: 5px; opacity: 0.5; }
        .nav-item.active .nav-icon { opacity: 1; filter: drop-shadow(0 0 5px var(--neon-pink)); }

        .scouter-alert { background: rgba(255, 140, 0, 0.15); border-left: 4px solid var(--dbz-orange); padding: 10px; font-size: 0.8rem; margin-bottom: 15px; line-height: 1.4; font-family: 'Orbitron', sans-serif;}
        .kris-alert { background: rgba(57, 255, 20, 0.15); border-left: 4px solid var(--scouter-green); padding: 10px; font-size: 0.8rem; margin-bottom: 15px; line-height: 1.4; font-family: 'Orbitron', sans-serif;}

        .hidden { display: none !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="matrix-canvas"></div>

    <header>
        <h1>🌙 PRISM SCOUTER 🐉</h1>
        <div class="subtitle" id="sync-status">SYSTEM ONLINE • KI STABLE</div>
    </header>

    <div id="scouter-timer" class="hidden">
        <span id="timer-display">00:00</span>
        <button class="timer-close-btn" onclick="stopTimer()">🛑</button>
    </div>

    <iframe id="hidden-sync-frame" name="hidden-sync-frame" class="hidden"></iframe>

    <div class="app-container">
        
        <div id="view-recipes" class="view-section">
            
            <select id="recipe-dropdown" class="recipe-selector" onchange="loadSelectedRecipe()">
                </select>

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <button class="magic-btn" onclick="generateRecipe()" style="flex: 1;">☄️ REROLL</button>
                <button class="magic-btn green" onclick="recommendFromVault
